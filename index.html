<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TIC · TAC · TOE // RETRO-CYBER</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0f;
    --panel: #11111a;
    --border: #1e1e2e;
    --x-color: #ff3c6e;
    --o-color: #00e5ff;
    --x-glow: rgba(255, 60, 110, 0.6);
    --o-glow: rgba(0, 229, 255, 0.6);
    --win-glow: rgba(255, 230, 0, 0.7);
    --win-color: #ffe600;
    --text-dim: #44445a;
    --text-mid: #8888aa;
    --text-bright: #e0e0ff;
    --cell-bg: #0e0e1c;
    --cell-hover: #161628;
    --scanline: rgba(255,255,255,0.015);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text-bright);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-y: auto;
    position: relative;
    padding: 20px 0;
  }

  /* CRT scanlines overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      var(--scanline) 3px,
      var(--scanline) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* Ambient glow blobs */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 40% 30% at 15% 20%, rgba(255,60,110,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 85% 80%, rgba(0,229,255,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 20px;
    width: 100%;
    max-width: 440px;
  }

  /* TITLE GLITCH */
  .title {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(14px, 4vw, 22px);
    letter-spacing: 6px;
    text-align: center;
    color: var(--text-bright);
    text-shadow:
      0 0 10px rgba(255,255,255,0.4),
      0 0 30px rgba(255,255,255,0.15);
    animation: flicker 6s infinite;
    position: relative;
  }

  .title span:nth-child(1) { color: var(--x-color); text-shadow: 0 0 14px var(--x-glow); }
  .title span:nth-child(3) { color: var(--o-color); text-shadow: 0 0 14px var(--o-glow); }

  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.85; }
    97% { opacity: 1; }
    98% { opacity: 0.9; }
  }

  /* DASHBOARD CONTROL PANEL */
  .dashboard {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  .dash-row {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
  }

  .dash-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex: 1;
  }

  .dash-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: var(--text-mid);
    letter-spacing: 1px;
  }

  .mode-row {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    background: var(--bg);
    width: 100%;
  }

  .mode-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    letter-spacing: 1px;
    padding: 8px 6px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    flex: 1;
    text-align: center;
    white-space: nowrap;
  }

  .mode-btn.active {
    background: var(--panel);
    color: var(--o-color);
    box-shadow: inset 0 0 10px rgba(0,229,255,0.15);
  }

  .mode-btn:hover:not(.active) {
    color: var(--text-mid);
    background: rgba(255, 255, 255, 0.03);
  }

  /* Specific neon glow button styles */
  #rulesetClassic.active { color: var(--o-color); box-shadow: inset 0 0 10px rgba(0,229,255,0.15); }
  #rulesetInfinite.active { color: var(--x-color); box-shadow: inset 0 0 10px rgba(255,60,110,0.15); }
  #rulesetCyber.active { color: #bd00ff; box-shadow: inset 0 0 10px rgba(189,0,255,0.2); }
  
  #btnBlitz.active { color: #ff8c00; box-shadow: inset 0 0 10px rgba(255,140,0,0.2); }
  #btnSound.active { color: var(--win-color); box-shadow: inset 0 0 10px rgba(255,230,0,0.2); }

  /* SCORE BAR */
  .scoreboard {
    display: flex;
    align-items: center;
    gap: 20px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 24px;
    width: 100%;
    justify-content: space-between;
  }

  .score-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .score-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    letter-spacing: 1px;
  }

  .score-block.x .score-label { color: var(--x-color); }
  .score-block.o .score-label { color: var(--o-color); }
  .score-block.draw .score-label { color: var(--text-mid); }

  .score-num {
    font-family: 'Press Start 2P', monospace;
    font-size: 20px;
    line-height: 1;
  }

  .score-block.x .score-num { color: var(--x-color); text-shadow: 0 0 12px var(--x-glow); }
  .score-block.o .score-num { color: var(--o-color); text-shadow: 0 0 12px var(--o-glow); }
  .score-block.draw .score-num { color: var(--text-mid); }

  .score-sep {
    color: var(--text-dim);
    font-size: 18px;
    font-weight: 700;
  }

  /* STATUS BAR */
  .status-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    min-height: 40px;
  }

  .status-bar {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-align: center;
    color: var(--text-mid);
    transition: color 0.3s;
  }

  .status-bar.turn-x { color: var(--x-color); text-shadow: 0 0 8px var(--x-glow); }
  .status-bar.turn-o { color: var(--o-color); text-shadow: 0 0 8px var(--o-glow); }
  .status-bar.win    { color: var(--win-color); text-shadow: 0 0 12px var(--win-glow); animation: winPulse 0.6s ease infinite alternate; }
  .status-bar.draw   { color: var(--text-mid); }

  @keyframes winPulse {
    from { text-shadow: 0 0 8px var(--win-glow); }
    to   { text-shadow: 0 0 24px var(--win-glow), 0 0 40px rgba(255,230,0,0.3); }
  }

  /* BLITZ TIMER BAR */
  .timer-bar-wrap {
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 8px;
    box-shadow: inset 0 0 4px rgba(0,0,0,0.5);
  }

  .timer-bar {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, var(--x-color), var(--o-color));
    box-shadow: 0 0 8px var(--o-glow);
    transition: width 0.05s linear;
  }

  /* BOARD */
  .board-wrap {
    position: relative;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(3, 110px);
    grid-template-rows: repeat(3, 110px);
    gap: 6px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px;
    position: relative;
  }

  /* Screen Shake Animation */
  .board.shake {
    animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both;
  }

  @keyframes shake {
    10%, 90% { transform: translate3d(-1px, 0, 0); }
    20%, 80% { transform: translate3d(2px, 0, 0); }
    30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
    40%, 60% { transform: translate3d(4px, 0, 0); }
  }

  .cell {
    background: var(--cell-bg);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.04);
  }

  .cell:hover:not(.taken) {
    background: var(--cell-hover);
    transform: scale(1.03);
  }

  .cell.taken { cursor: default; }

  .cell.win-cell {
    background: rgba(255, 230, 0, 0.07);
    border-color: rgba(255, 230, 0, 0.3);
    animation: winCell 0.4s ease forwards;
  }

  @keyframes winCell {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1.05); }
  }

  /* X and O SVG marks */
  .mark {
    width: 56px;
    height: 56px;
    animation: popIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    opacity: 0;
    transform: scale(0.5);
    z-index: 2;
  }

  @keyframes popIn {
    to { opacity: 1; transform: scale(1); }
  }

  .mark-x line {
    stroke: var(--x-color);
    stroke-width: 5;
    stroke-linecap: round;
    filter: drop-shadow(0 0 6px var(--x-glow));
    stroke-dasharray: 60;
    stroke-dashoffset: 60;
    animation: drawLine 0.3s ease forwards 0.05s;
  }

  .mark-x line:nth-child(2) { animation-delay: 0.15s; }

  @keyframes drawLine {
    to { stroke-dashoffset: 0; }
  }

  .mark-o circle {
    fill: none;
    stroke: var(--o-color);
    stroke-width: 5;
    stroke-linecap: round;
    filter: drop-shadow(0 0 6px var(--o-glow));
    stroke-dasharray: 200;
    stroke-dashoffset: 200;
    animation: drawCircle 0.4s ease forwards 0.05s;
  }

  @keyframes drawCircle {
    to { stroke-dashoffset: 0; }
  }

  /* Ghost Mark on Hover based on turn */
  .board.turn-x .cell:not(.taken):hover::after {
    content: '✕';
    font-family: 'Rajdhani', sans-serif;
    font-size: 40px;
    font-weight: 700;
    color: var(--x-color);
    opacity: 0.2;
    position: absolute;
    filter: drop-shadow(0 0 4px var(--x-glow));
  }

  .board.turn-o .cell:not(.taken):hover::after {
    content: '◯';
    font-family: 'Rajdhani', sans-serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--o-color);
    opacity: 0.2;
    position: absolute;
    filter: drop-shadow(0 0 4px var(--o-glow));
  }

  /* Fading-Soon warning pulse for Infinite mode */
  .cell.fading-soon .mark {
    animation: fadePulse 0.8s ease-in-out infinite alternate;
  }

  @keyframes fadePulse {
    from { opacity: 1; filter: saturate(1.5); }
    to { opacity: 0.2; filter: saturate(0.5) blur(1px); }
  }

  /* Visual Mark Fade Out Animation */
  .fade-out-anim {
    animation: fadeOut 0.2s ease forwards !important;
  }

  @keyframes fadeOut {
    to { opacity: 0; transform: scale(0.3); }
  }

  /* POWERUPS (CYBER HACK MODE) */
  .powerup-icon {
    position: absolute;
    width: 32px;
    height: 32px;
    pointer-events: none;
    animation: floatPowerup 2s ease-in-out infinite alternate;
    z-index: 1;
  }

  @keyframes floatPowerup {
    from { transform: translateY(-4px) scale(0.95); filter: drop-shadow(0 0 2px currentColor); }
    to { transform: translateY(4px) scale(1.05); filter: drop-shadow(0 0 8px currentColor); }
  }

  .emp-icon { color: #bd00ff; }
  .glitch-icon { color: #ff8c00; }
  .shield-icon { color: #00ff66; }

  /* Shield visual on taken cell */
  .cell.shielded::after {
    content: '';
    position: absolute;
    inset: 4px;
    border: 2px solid #00ff66;
    border-radius: 4px;
    box-shadow: 0 0 8px rgba(0,255,102,0.4);
    pointer-events: none;
    animation: pulseShield 1.5s ease-in-out infinite alternate;
    z-index: 3;
  }

  @keyframes pulseShield {
    from { opacity: 0.5; box-shadow: 0 0 4px rgba(0,255,102,0.2); }
    to { opacity: 1; box-shadow: 0 0 12px rgba(0,255,102,0.6); }
  }

  /* Win line overlay */
  .win-line-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  .win-line-svg line {
    stroke: var(--win-color);
    stroke-width: 4;
    stroke-linecap: round;
    filter: drop-shadow(0 0 8px var(--win-glow));
    stroke-dasharray: 400;
    stroke-dashoffset: 400;
    animation: drawWinLine 0.5s ease forwards;
  }

  @keyframes drawWinLine {
    to { stroke-dashoffset: 0; }
  }

  /* BUTTONS */
  .controls {
    display: flex;
    gap: 14px;
  }

  .btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    padding: 12px 18px;
    border: 1px solid var(--text-dim);
    border-radius: 4px;
    background: transparent;
    color: var(--text-mid);
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn:hover {
    border-color: var(--o-color);
    color: var(--o-color);
    box-shadow: 0 0 12px rgba(0,229,255,0.2);
    transform: translateY(-1px);
  }

  .btn.primary {
    border-color: var(--x-color);
    color: var(--x-color);
  }

  .btn.primary:hover {
    box-shadow: 0 0 12px rgba(255,60,110,0.3);
    border-color: var(--x-color);
    color: var(--x-color);
  }

  /* Footer */
  .footer {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="wrapper">

  <div class="title">
    <span>TIC</span> · <span>TAC</span> · TOE
  </div>

  <!-- DASHBOARD CONTROL PANEL -->
  <div class="dashboard">
    <!-- Row 1: Matchmaking & Ruleset -->
    <div class="dash-row">
      <div class="dash-group">
        <span class="dash-label">OPPONENT</span>
        <div class="mode-row">
          <button class="mode-btn active" id="btn2p" onclick="setMode('2p')">2 PLAYER</button>
          <button class="mode-btn" id="btnAI" onclick="setMode('ai')">VS AI</button>
        </div>
      </div>
      
      <div class="dash-group">
        <span class="dash-label">RULESET</span>
        <div class="mode-row">
          <button class="mode-btn active" id="rulesetClassic" onclick="setRuleset('classic')">CLASSIC</button>
          <button class="mode-btn" id="rulesetInfinite" onclick="setRuleset('infinite')">INFINITE</button>
          <button class="mode-btn" id="rulesetCyber" onclick="setRuleset('cyber')">CYBER HACK</button>
        </div>
      </div>
    </div>

    <!-- Row 2: AI difficulty (hidden by default) & Hardware settings -->
    <div class="dash-row" id="sub-dash-row">
      <div class="dash-group" id="diff-group" style="display: none;">
        <span class="dash-label">AI SKILL</span>
        <div class="mode-row">
          <button class="mode-btn" id="diffEasy" onclick="setDifficulty('easy')">EASY</button>
          <button class="mode-btn active" id="diffMedium" onclick="setDifficulty('medium')">MEDIUM</button>
          <button class="mode-btn" id="diffImpossible" onclick="setDifficulty('impossible')">MAX</button>
        </div>
      </div>

      <div class="dash-group">
        <span class="dash-label">SYSTEMS</span>
        <div class="mode-row">
          <button class="mode-btn" id="btnBlitz" onclick="toggleBlitz()">BLITZ: OFF</button>
          <button class="mode-btn active" id="btnSound" onclick="toggleSound()">SOUND: ON</button>
        </div>
      </div>
    </div>
  </div>

  <!-- SCOREBOARD -->
  <div class="scoreboard">
    <div class="score-block x">
      <div class="score-label" id="label-x">PLAYER X</div>
      <div class="score-num" id="score-x">0</div>
    </div>
    <div class="score-sep">:</div>
    <div class="score-block draw">
      <div class="score-label">DRAW</div>
      <div class="score-num" id="score-d">0</div>
    </div>
    <div class="score-sep">:</div>
    <div class="score-block o">
      <div class="score-label" id="label-o">PLAYER O</div>
      <div class="score-num" id="score-o">0</div>
    </div>
  </div>

  <!-- STATUS & BLITZ TIMER -->
  <div class="status-container">
    <div class="status-bar turn-x" id="status">PLAYER X'S TURN</div>
    <div class="timer-bar-wrap" id="timerBarWrap" style="display:none">
      <div class="timer-bar" id="timerBar"></div>
    </div>
  </div>

  <!-- GAME BOARD -->
  <div class="board-wrap">
    <div class="board turn-x" id="board"></div>
    <svg class="win-line-svg" id="winLineSvg" style="display:none">
      <line id="winLine" />
    </svg>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button class="btn primary" onclick="resetGame()">NEW GAME</button>
    <button class="btn" onclick="resetScore()">RESET SCORE</button>
  </div>

  <div class="footer">INSERT COIN TO CONTINUE</div>
</div>

<script>
  // ── Web Audio API Synthesizer Engine ───────────────────
  const SynthFX = {
    ctx: null,
    muted: false,
    init() {
      if (!this.ctx) {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      }
    },
    play(freq, duration, typeOsc = 'sine', slideTo = 0) {
      if (this.muted) return;
      this.init();
      if (this.ctx.state === 'suspended') {
        this.ctx.resume();
      }
      try {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        
        osc.type = typeOsc;
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        if (slideTo > 0) {
          osc.frequency.exponentialRampToValueAtTime(slideTo, this.ctx.currentTime + duration);
        }
        
        gain.gain.setValueAtTime(0.12, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + duration);
        
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
      } catch (e) {
        console.error("Audio error:", e);
      }
    },
    playClick() {
      this.play(600, 0.06, 'triangle');
    },
    playPlaceMark(player) {
      if (player === 'X') {
        this.play(350, 0.12, 'triangle', 700);
      } else {
        this.play(450, 0.12, 'sine', 150);
      }
    },
    playFade() {
      this.play(300, 0.25, 'sawtooth', 80);
    },
    playPowerUp() {
      this.init();
      if (this.muted) return;
      const notes = [261.63, 329.63, 392.00, 523.25];
      notes.forEach((freq, i) => {
        setTimeout(() => {
          this.play(freq, 0.15, 'square');
        }, i * 65);
      });
    },
    playWin() {
      this.init();
      if (this.muted) return;
      const notes = [523.25, 659.25, 783.99, 1046.50];
      notes.forEach((freq, i) => {
        setTimeout(() => {
          this.play(freq, 0.18, 'triangle', freq * 1.15);
        }, i * 110);
      });
    },
    playDraw() {
      this.play(140, 0.35, 'sawtooth', 60);
    },
    playTick() {
      this.play(800, 0.03, 'sine');
    },
    playGlitch() {
      this.play(110, 0.22, 'sawtooth', 330);
    }
  };

  // Initialize Audio Context on first click of the document
  document.addEventListener('click', () => {
    SynthFX.init();
  }, { once: true });

  // ── Game State ─────────────────────────────────────────
  let board = Array(9).fill(null);
  let powerups = Array(9).fill(null); // 'emp', 'glitch', 'shield', or null
  let shielded = Array(9).fill(false); // tracks cell shield status
  let movesQueue = { X: [], O: [] }; // tracks order of moves in Infinite Mode
  
  let current = 'X';
  let gameOver = false;
  let scores = { X: 0, O: 0, D: 0 };
  
  let mode = '2p'; // '2p' or 'ai'
  let ruleset = 'classic'; // 'classic', 'infinite', 'cyber'
  let difficulty = 'medium'; // 'easy', 'medium', 'impossible'

  // Blitz turn timer variables
  let timerInterval = null;
  let blitzEnabled = false;
  let lastTickTime = 0;
  const BLITZ_TIME = 6000; // 6 seconds per turn

  const WIN_COMBOS = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  // ── Build board ────────────────────────────────────────
  function buildBoard() {
    const el = document.getElementById('board');
    el.innerHTML = '';
    board.forEach((_, i) => {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.i = i;

      cell.addEventListener('click', () => handleClick(i));
      el.appendChild(cell);

      // Render powerup icon if ruleset is cyber hack and powerup exists
      if (ruleset === 'cyber' && powerups[i]) {
        renderPowerupIconInCell(cell, powerups[i]);
      }
    });
    document.getElementById('winLineSvg').style.display = 'none';
  }

  function renderPowerupIconInCell(cellEl, type) {
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('class', `powerup-icon ${type}-icon`);
    svg.setAttribute('viewBox', '0 0 24 24');
    if (type === 'emp') {
      svg.innerHTML = `<path d="M7 2v11h3v9l7-12h-4l4-8z" fill="none" stroke="#bd00ff" stroke-width="2" stroke-linejoin="round" />`;
    } else if (type === 'glitch') {
      svg.innerHTML = `<path d="M17 4l4 4-4 4M7 20l-4-4 4-4M3 8h18M21 16H3" fill="none" stroke="#ff8c00" stroke-width="2" stroke-linecap="round" />`;
    } else if (type === 'shield') {
      svg.innerHTML = `<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" fill="none" stroke="#00ff66" stroke-width="2" stroke-linejoin="round" />`;
    }
    cellEl.appendChild(svg);
  }

  // ── Spawning Power-ups ─────────────────────────────────
  function spawnPowerups(count = 2) {
    powerups.fill(null);
    let spawned = 0;
    let attempts = 0;
    while (spawned < count && attempts < 100) {
      let idx = Math.floor(Math.random() * 9);
      if (!board[idx] && !powerups[idx]) {
        powerups[idx] = getRandomPowerupType();
        spawned++;
      }
      attempts++;
    }
  }

  function spawnSinglePowerup() {
    const emptyIndices = [];
    board.forEach((v, i) => {
      if (!v && !powerups[i]) emptyIndices.push(i);
    });
    if (emptyIndices.length > 0) {
      const idx = emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
      powerups[idx] = getRandomPowerupType();
      const cell = document.querySelectorAll('.cell')[idx];
      if (cell) renderPowerupIconInCell(cell, powerups[idx]);
    }
  }

  function getRandomPowerupType() {
    const types = ['emp', 'glitch', 'shield'];
    return types[Math.floor(Math.random() * types.length)];
  }

  // ── Blitz Timer Logic ──────────────────────────────────
  function startTimer() {
    stopTimer();
    if (!blitzEnabled || gameOver) return;
    
    const timerBarWrap = document.getElementById('timerBarWrap');
    const timerBar = document.getElementById('timerBar');
    timerBarWrap.style.display = 'block';
    
    let start = Date.now();
    lastTickTime = 0;
    
    timerInterval = setInterval(() => {
      let elapsed = Date.now() - start;
      let remaining = BLITZ_TIME - elapsed;
      
      if (remaining <= 0) {
        stopTimer();
        timerBar.style.width = '0%';
        handleTimeOut();
      } else {
        let pct = (remaining / BLITZ_TIME) * 100;
        timerBar.style.width = pct + '%';
        
        // Timer ticking alert in final 2 seconds
        if (remaining <= 2000) {
          let secondsLeft = Math.ceil(remaining / 1000);
          if (secondsLeft !== lastTickTime) {
            lastTickTime = secondsLeft;
            SynthFX.playTick();
            timerBar.style.background = 'var(--x-color)';
          }
        } else {
          timerBar.style.background = 'linear-gradient(90deg, var(--x-color), var(--o-color))';
        }
      }
    }, 50);
  }

  function stopTimer() {
    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }
    document.getElementById('timerBarWrap').style.display = 'none';
  }

  function handleTimeOut() {
    if (gameOver) return;
    SynthFX.playGlitch();
    
    // Choose random move for the current player
    const emptyIndices = [];
    board.forEach((v, i) => {
      if (!v) emptyIndices.push(i);
    });
    if (emptyIndices.length > 0) {
      const idx = emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
      makeMove(idx, current);
    }
  }

  // ── Handle click ───────────────────────────────────────
  function handleClick(i) {
    if (gameOver || board[i]) return;
    if (mode === 'ai' && current === 'O') return;
    makeMove(i, current);
  }

  function makeMove(i, player) {
    let capturedPowerup = (ruleset === 'cyber') ? powerups[i] : null;

    // Place mark in data model
    board[i] = player;

    // Handle Infinite mode queues
    if (ruleset === 'infinite') {
      movesQueue[player].push(i);
      if (movesQueue[player].length > 3) {
        const oldest = movesQueue[player].shift();
        board[oldest] = null;
        shielded[oldest] = false;
        clearCellVisual(oldest);
        SynthFX.playFade();
      }
    }

    // Clean up captured power-up icon from DOM cell
    const cell = document.querySelectorAll('.cell')[i];
    const icon = cell.querySelector('.powerup-icon');
    if (icon) cell.removeChild(icon);
    powerups[i] = null;

    // Render the mark
    renderCell(i, player);
    SynthFX.playPlaceMark(player);

    // Apply power-up behaviors
    if (capturedPowerup) {
      handlePowerup(i, player, capturedPowerup);
    }

    // Clear previous pulsating warning glow
    document.querySelectorAll('.cell').forEach(c => c.classList.remove('fading-soon'));

    // Check if game has ended
    const result = checkResult();
    if (result) {
      endGame(result);
      return;
    }

    // Toggle active player turn
    current = current === 'X' ? 'O' : 'X';
    updateBoardGhostClass();

    // Pulse the mark about to fade out next (Infinite Mode)
    if (ruleset === 'infinite' && movesQueue[current].length === 3) {
      const oldestIndex = movesQueue[current][0];
      const oldestCell = document.querySelectorAll('.cell')[oldestIndex];
      if (oldestCell) {
        oldestCell.classList.add('fading-soon');
      }
    }

    setStatus();

    // Trigger AI or start human Blitz timer
    if (mode === 'ai' && current === 'O' && !gameOver) {
      stopTimer();
      setTimeout(aiMove, 500);
    } else {
      startTimer();
    }
  }

  function renderCell(i, player) {
    const cell = document.querySelectorAll('.cell')[i];
    cell.classList.add('taken');
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('viewBox', '0 0 56 56');
    svg.setAttribute('class', 'mark mark-' + player.toLowerCase());
    if (player === 'X') {
      svg.innerHTML = `<line x1="12" y1="12" x2="44" y2="44"/><line x1="44" y1="12" x2="12" y2="44"/>`;
    } else {
      svg.innerHTML = `<circle cx="28" cy="28" r="18"/>`;
    }
    cell.appendChild(svg);
  }

  function clearCellVisual(idx) {
    const cell = document.querySelectorAll('.cell')[idx];
    if (!cell) return;
    cell.classList.remove('taken', 'win-cell', 'fading-soon', 'shielded');
    const mark = cell.querySelector('.mark');
    if (mark) {
      mark.classList.add('fade-out-anim');
      setTimeout(() => {
        if (cell.contains(mark)) cell.removeChild(mark);
      }, 200);
    }
  }

  // ── Power-up Implementation ───────────────────────────
  function handlePowerup(i, player, type) {
    const opponent = player === 'X' ? 'O' : 'X';
    
    if (type === 'shield') {
      shielded[i] = true;
      const cell = document.querySelectorAll('.cell')[i];
      cell.classList.add('shielded');
      SynthFX.playPowerUp();
    } 
    else if (type === 'emp') {
      // Find opponent marks that are NOT shielded
      const targets = [];
      board.forEach((val, idx) => {
        if (val === opponent && !shielded[idx]) targets.push(idx);
      });

      if (targets.length > 0) {
        const victim = targets[Math.floor(Math.random() * targets.length)];
        board[victim] = null;
        shielded[victim] = false;
        
        if (ruleset === 'infinite') {
          movesQueue[opponent] = movesQueue[opponent].filter(idx => idx !== victim);
        }
        
        clearCellVisual(victim);
        SynthFX.playGlitch();
        triggerScreenShake();
      } else {
        SynthFX.playPowerUp();
      }
      setTimeout(spawnSinglePowerup, 800);
    } 
    else if (type === 'glitch') {
      // Swapping a random X and a random O mark
      const xIndices = [];
      const oIndices = [];
      board.forEach((val, idx) => {
        if (val === 'X') xIndices.push(idx);
        if (val === 'O') oIndices.push(idx);
      });

      if (xIndices.length > 0 && oIndices.length > 0) {
        const xIdx = xIndices[Math.floor(Math.random() * xIndices.length)];
        const oIdx = oIndices[Math.floor(Math.random() * oIndices.length)];

        // Swap board values
        board[xIdx] = 'O';
        board[oIdx] = 'X';

        // Swap shield values
        const sTemp = shielded[xIdx];
        shielded[xIdx] = shielded[oIdx];
        shielded[oIdx] = sTemp;

        // Swap positions in Infinite mode queues
        if (ruleset === 'infinite') {
          const xPos = movesQueue['X'].indexOf(xIdx);
          const oPos = movesQueue['O'].indexOf(oIdx);
          if (xPos !== -1) movesQueue['X'][xPos] = oIdx;
          if (oPos !== -1) movesQueue['O'][oPos] = xIdx;
        }

        // Rerender swap animations
        clearCellVisual(xIdx);
        clearCellVisual(oIdx);
        
        renderCell(xIdx, 'O');
        renderCell(oIdx, 'X');
        
        if (shielded[xIdx]) document.querySelectorAll('.cell')[xIdx].classList.add('shielded');
        if (shielded[oIdx]) document.querySelectorAll('.cell')[oIdx].classList.add('shielded');

        SynthFX.playGlitch();
        triggerScreenShake();
      } else {
        SynthFX.playPowerUp();
      }
      setTimeout(spawnSinglePowerup, 800);
    }
  }

  function triggerScreenShake() {
    const boardEl = document.getElementById('board');
    boardEl.classList.add('shake');
    setTimeout(() => {
      boardEl.classList.remove('shake');
    }, 300);
  }

  // ── Check result ───────────────────────────────────────
  function checkResult() {
    for (const [a,b,c] of WIN_COMBOS) {
      if (board[a] && board[a] === board[b] && board[a] === board[c])
        return { winner: board[a], combo: [a,b,c] };
    }
    if (board.every(Boolean)) return { winner: null };
    return null;
  }

  // ── End game ───────────────────────────────────────────
  function endGame(result) {
    gameOver = true;
    stopTimer();
    const status = document.getElementById('status');
    if (result.winner) {
      scores[result.winner]++;
      updateScores();
      const name = mode === 'ai' && result.winner === 'O' ? 'AI' : 'PLAYER ' + result.winner;
      status.textContent = name + ' WINS!';
      status.className = 'status-bar win';
      highlightWin(result.combo);
      drawWinLine(result.combo);
      SynthFX.playWin();
    } else {
      scores.D++;
      updateScores();
      status.textContent = "IT'S A DRAW!";
      status.className = 'status-bar draw';
      SynthFX.playDraw();
    }
  }

  function highlightWin(combo) {
    const cells = document.querySelectorAll('.cell');
    combo.forEach(i => cells[i].classList.add('win-cell'));
  }

  function drawWinLine(combo) {
    const boardEl = document.getElementById('board');
    const cells = document.querySelectorAll('.cell');
    const bRect = boardEl.getBoundingClientRect();
    const cA = cells[combo[0]].getBoundingClientRect();
    const cC = cells[combo[2]].getBoundingClientRect();

    function cx(r) { return r.left + r.width/2 - bRect.left; }
    function cy(r) { return r.top + r.height/2 - bRect.top; }

    const svg = document.getElementById('winLineSvg');
    const line = document.getElementById('winLine');
    svg.style.display = 'block';
    line.setAttribute('x1', cx(cA));
    line.setAttribute('y1', cy(cA));
    line.setAttribute('x2', cx(cC));
    line.setAttribute('y2', cy(cC));
    
    line.style.animation = 'none';
    void line.offsetWidth;
    line.style.animation = '';
  }

  // ── AI (Adaptive Difficulties) ─────────────────────────
  function aiMove() {
    if (gameOver) return;

    let targetIdx = -1;
    const emptyIndices = [];
    board.forEach((v, i) => {
      if (!v) emptyIndices.push(i);
    });

    if (emptyIndices.length === 0) return;

    if (difficulty === 'easy') {
      targetIdx = emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
    } 
    else if (difficulty === 'medium') {
      // 1. Check if AI can win this turn
      targetIdx = findWinningMove('O');
      
      // 2. Check if AI must block player win
      if (targetIdx === -1) {
        targetIdx = findWinningMove('X');
      }
      
      // 3. Cyber mode power-up attraction heuristic
      if (targetIdx === -1 && ruleset === 'cyber') {
        const powerupTargets = [];
        emptyIndices.forEach(idx => {
          if (powerups[idx]) powerupTargets.push(idx);
        });
        if (powerupTargets.length > 0) {
          targetIdx = powerupTargets[Math.floor(Math.random() * powerupTargets.length)];
        }
      }
      
      // 4. Default: 40% optimal, 60% random move
      if (targetIdx === -1) {
        if (Math.random() < 0.4) {
          targetIdx = getOptimalMove();
        } else {
          targetIdx = emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
        }
      }
    } 
    else {
      // Impossible AI - Always plays optimal move
      // Prioritize immediate wins or power-ups in cyber mode, otherwise play optimal minimax
      targetIdx = findWinningMove('O');
      if (targetIdx === -1) {
        targetIdx = findWinningMove('X');
      }
      if (targetIdx === -1 && ruleset === 'cyber') {
        const powerupTargets = [];
        emptyIndices.forEach(idx => {
          if (powerups[idx]) powerupTargets.push(idx);
        });
        if (powerupTargets.length > 0) {
          targetIdx = powerupTargets[Math.floor(Math.random() * powerupTargets.length)];
        }
      }
      if (targetIdx === -1) {
        targetIdx = getOptimalMove();
      }
    }

    if (targetIdx !== -1) {
      makeMove(targetIdx, 'O');
    }
  }

  function findWinningMove(player) {
    for (let i = 0; i < 9; i++) {
      if (!board[i]) {
        const tempBoard = [...board];
        tempBoard[i] = player;
        
        // Handle queue deletion simulation for Infinite ruleset
        if (ruleset === 'infinite' && movesQueue[player].length === 3) {
          const oldest = movesQueue[player][0];
          tempBoard[oldest] = null;
        }

        if (checkBoard(tempBoard) === player) {
          return i;
        }
      }
    }
    return -1;
  }

  function getOptimalMove() {
    if (ruleset === 'infinite') {
      const state = { board: [...board], queue: { X: [...movesQueue.X], O: [...movesQueue.O] } };
      const best = minimaxInfinite(state, 'O', 0, true);
      return best.index !== undefined ? best.index : -1;
    } else {
      const best = minimax(board, 'O', true);
      return best.index !== undefined ? best.index : -1;
    }
  }

  function checkBoard(brd) {
    for (const [a,b,c] of WIN_COMBOS) {
      if (brd[a] && brd[a] === brd[b] && brd[a] === brd[c]) return brd[a];
    }
    return null;
  }

  // Standard minimax for Classic
  function minimax(brd, player, isMax) {
    const win = checkBoard(brd);
    if (win === 'O') return { score: 10 };
    if (win === 'X') return { score: -10 };
    if (brd.every(Boolean)) return { score: 0 };

    const moves = [];
    brd.forEach((v, i) => {
      if (!v) {
        const nb = [...brd]; nb[i] = player;
        const res = minimax(nb, player === 'O' ? 'X' : 'O', !isMax);
        moves.push({ index: i, score: res.score });
      }
    });

    if (moves.length === 0) return { score: 0 };

    return moves.reduce((best, m) =>
      isMax ? (m.score > best.score ? m : best) : (m.score < best.score ? m : best)
    , { score: isMax ? -Infinity : Infinity });
  }

  // Queue-simulating minimax for Infinite Mode (depth-capped)
  function simulateMove(boardState, queueState, index, player) {
    const nextBoard = [...boardState];
    const nextQueue = { X: [...queueState.X], O: [...queueState.O] };
    
    nextBoard[index] = player;
    nextQueue[player].push(index);
    
    if (nextQueue[player].length > 3) {
      const oldest = nextQueue[player].shift();
      nextBoard[oldest] = null;
    }
    return { board: nextBoard, queue: nextQueue };
  }

  function evaluateBoard(brd, player) {
    const opponent = player === 'O' ? 'X' : 'O';
    const values = [2, 1, 2, 1, 3, 1, 2, 1, 2]; // Center > Corner > Edge
    let score = 0;
    brd.forEach((v, i) => {
      if (v === player) score += values[i];
      else if (v === opponent) score -= values[i];
    });
    return score;
  }

  function minimaxInfinite(state, player, depth, isMax) {
    const win = checkBoard(state.board);
    if (win === 'O') return { score: 10 - depth };
    if (win === 'X') return { score: depth - 10 };
    if (depth > 5) return { score: evaluateBoard(state.board, 'O') };

    const moves = [];
    state.board.forEach((v, i) => {
      if (!v) {
        const nextState = simulateMove(state.board, state.queue, i, player);
        const res = minimaxInfinite(nextState, player === 'O' ? 'X' : 'O', depth + 1, !isMax);
        moves.push({ index: i, score: res.score });
      }
    });

    if (moves.length === 0) return { score: 0 };

    return moves.reduce((best, m) =>
      isMax ? (m.score > best.score ? m : best) : (m.score < best.score ? m : best)
    , { score: isMax ? -Infinity : Infinity });
  }

  // ── UI Control Panel Actions ───────────────────────────
  function setMode(m) {
    SynthFX.playClick();
    mode = m;
    document.getElementById('btn2p').classList.toggle('active', m === '2p');
    document.getElementById('btnAI').classList.toggle('active', m === 'ai');
    document.getElementById('label-o').textContent = m === 'ai' ? 'AI' : 'PLAYER O';
    
    const diffGroup = document.getElementById('diff-group');
    if (m === 'ai') {
      diffGroup.style.display = 'flex';
    } else {
      diffGroup.style.display = 'none';
    }
    
    resetGame();
  }

  function setRuleset(r) {
    SynthFX.playClick();
    ruleset = r;
    document.getElementById('rulesetClassic').classList.toggle('active', r === 'classic');
    document.getElementById('rulesetInfinite').classList.toggle('active', r === 'infinite');
    document.getElementById('rulesetCyber').classList.toggle('active', r === 'cyber');
    
    resetGame();
  }

  function setDifficulty(d) {
    SynthFX.playClick();
    difficulty = d;
    document.getElementById('diffEasy').classList.toggle('active', d === 'easy');
    document.getElementById('diffMedium').classList.toggle('active', d === 'medium');
    document.getElementById('diffImpossible').classList.toggle('active', d === 'impossible');
    
    resetGame();
  }

  function toggleBlitz() {
    blitzEnabled = !blitzEnabled;
    const btn = document.getElementById('btnBlitz');
    btn.textContent = blitzEnabled ? 'BLITZ: ON' : 'BLITZ: OFF';
    btn.classList.toggle('active', blitzEnabled);
    SynthFX.playClick();

    if (blitzEnabled) {
      startTimer();
    } else {
      stopTimer();
    }
  }

  function toggleSound() {
    SynthFX.muted = !SynthFX.muted;
    const btn = document.getElementById('btnSound');
    btn.textContent = SynthFX.muted ? 'SOUND: OFF' : 'SOUND: ON';
    btn.classList.toggle('active', !SynthFX.muted);
    SynthFX.playClick();
  }

  function setStatus() {
    const s = document.getElementById('status');
    if (mode === 'ai' && current === 'O') {
      s.textContent = "AI IS THINKING...";
      s.className = 'status-bar turn-o';
    } else {
      const name = mode === 'ai' && current === 'O' ? 'AI' : 'PLAYER ' + current;
      s.textContent = name + "'S TURN";
      s.className = 'status-bar turn-' + current.toLowerCase();
    }
  }

  function updateScores() {
    document.getElementById('score-x').textContent = scores.X;
    document.getElementById('score-o').textContent = scores.O;
    document.getElementById('score-d').textContent = scores.D;
  }

  function updateBoardGhostClass() {
    const boardEl = document.getElementById('board');
    boardEl.className = 'board turn-' + current.toLowerCase();
  }

  function resetGame() {
    board = Array(9).fill(null);
    powerups.fill(null);
    shielded.fill(false);
    movesQueue = { X: [], O: [] };
    current = 'X';
    gameOver = false;

    stopTimer();

    if (ruleset === 'cyber') {
      spawnPowerups(2);
    }

    buildBoard();
    setStatus();
    updateBoardGhostClass();

    if (blitzEnabled && (mode === '2p' || current === 'X')) {
      startTimer();
    }
  }

  function resetScore() {
    SynthFX.playClick();
    scores = { X: 0, O: 0, D: 0 };
    updateScores();
    resetGame();
  }

  // ── Init ───────────────────────────────────────────────
  buildBoard();
  setStatus();
  updateBoardGhostClass();
</script>
</body>
